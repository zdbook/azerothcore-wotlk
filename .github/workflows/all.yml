name: Full Build AzerothCore (All Components)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  full-build:
    name: Full Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact-suffix: linux
          - os: windows-2022
            artifact-suffix: windows
          - os: macos-13
            artifact-suffix: macos

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      # ---------- 依赖安装 ----------
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake make gcc g++ clang libmysqlclient-dev libssl-dev libbz2-dev libreadline-dev libncurses-dev libboost-all-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake openssl mysql-client boost

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install openssl boost-msvc-14.3 mysql

      # ---------- CMake 配置（全量编译 + PIC 修复）----------
      # 使用 bash shell 确保跨平台反斜杠续行有效
      - name: Configure CMake (Full Build)
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DTOOLS_BUILD=all \
            -DSCRIPTS=dynamic \
            -DMODULES=static \
            -DWITH_WARNINGS=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      # ---------- 编译全部 ----------
      - name: Build all (servers + tools + scripts)
        run: cmake --build build --config RelWithDebInfo --parallel 4

      # ---------- 调试：列出生成的文件（Windows）----------
      - name: List build output (Windows)
        if: runner.os == 'Windows'
        run: Get-ChildItem -Recurse build/bin/ | Select-Object FullName
        shell: pwsh

      # ---------- 打包产物：Unix ----------
      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts/bin artifacts/etc artifacts/scripts
          cp -v build/bin/worldserver   artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/authserver    artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/mapextractor  artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/mmaps_generator artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/vmap4extractor artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/vmap4assembler artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/dbimport      artifacts/bin/ 2>/dev/null || true
          cp -v build/lib/libscripts.so  artifacts/scripts/ 2>/dev/null || true
          cp -v src/server/worldserver/worldserver.conf.dist artifacts/etc/
          cp -v src/server/authserver/authserver.conf.dist artifacts/etc/
          cp -v apps/extractor/extractor.bat artifacts/ 2>/dev/null || true
          echo "Full build of AzerothCore (commit: ${{ github.sha }})" > artifacts/README.txt

      # ---------- 打包产物：Windows ----------
      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          $binDir = "build/bin/RelWithDebInfo"
          # 检查关键文件是否存在
          $required = @("worldserver.exe", "authserver.exe", "mapextractor.exe", "mmaps_generator.exe", "vmap4extractor.exe", "vmap4assembler.exe", "dbimport.exe")
          $missing = @()
          foreach ($file in $required) {
            if (-not (Test-Path "$binDir/$file")) {
              $missing += $file
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required binaries: $($missing -join ', ')"
            exit 1
          }
          # 创建目录并复制
          mkdir artifacts/bin, artifacts/etc, artifacts/scripts -Force
          Copy-Item "$binDir/worldserver.exe" artifacts/bin/
          Copy-Item "$binDir/authserver.exe" artifacts/bin/
          Copy-Item "$binDir/mapextractor.exe" artifacts/bin/
          Copy-Item "$binDir/mmaps_generator.exe" artifacts/bin/
          Copy-Item "$binDir/vmap4extractor.exe" artifacts/bin/
          Copy-Item "$binDir/vmap4assembler.exe" artifacts/bin/
          Copy-Item "$binDir/dbimport.exe" artifacts/bin/
          Copy-Item "$binDir/scripts.dll" artifacts/scripts/ -ErrorAction SilentlyContinue
          Copy-Item "src/server/worldserver/worldserver.conf.dist" artifacts/etc/
          Copy-Item "src/server/authserver/authserver.conf.dist" artifacts/etc/
          Copy-Item "apps/extractor/extractor.bat" artifacts/
          Write-Output "Full build of AzerothCore (commit: ${{ github.sha }})" | Out-File artifacts/README.txt -Encoding utf8
        shell: pwsh

      # ---------- 创建 ZIP ----------
      - name: Create final zip archive
        run: |
          cd artifacts
          zip -r ../azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip .
        shell: bash

      # ---------- 上传 ZIP ----------
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-full-${{ matrix.artifact-suffix }}
          path: azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 7
