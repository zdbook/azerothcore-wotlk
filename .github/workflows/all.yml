name: AzerothCore Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies via Chocolatey
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --yes
          choco install openssl boost-msvc-14.3 mysql --yes

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DTOOLS_BUILD=all \
            -DSCRIPTS=dynamic \
            -DMODULES=static \
            -DWITH_WARNINGS=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo --parallel 4

      - name: Install
        shell: pwsh
        run: cmake --install build --config RelWithDebInfo --prefix ./install

      - name: Collect artifacts
        shell: pwsh
        run: |
          $binDir = "build/bin/RelWithDebInfo"
          $required = @(
            "worldserver.exe", "authserver.exe",
            "map_extractor.exe", "mmaps_generator.exe",
            "vmap4_extractor.exe", "vmap4_assembler.exe", "dbimport.exe"
          )
          $missing = @()
          foreach ($file in $required) {
            if (-not (Test-Path "$binDir/$file")) {
              $missing += $file
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required binaries in '$binDir': $($missing -join ', ')"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path artifacts/bin, artifacts/etc, artifacts/scripts | Out-Null
          Copy-Item "$binDir/*.exe" -Destination "artifacts/bin/" -Force
          Copy-Item "$binDir/scripts_*.dll" -Destination "artifacts/scripts/" -Force -ErrorAction SilentlyContinue
          # 配置文件现在位于 install/configs/ 下
          Copy-Item "install/configs/worldserver.conf.dist" -Destination "artifacts/etc/" -Force
          Copy-Item "install/configs/authserver.conf.dist" -Destination "artifacts/etc/" -Force
          # 可选的 extractor.bat（如果存在）
          Copy-Item "apps/extractor/extractor.bat" -Destination "artifacts/" -Force -ErrorAction SilentlyContinue
          @"
Full build of AzerothCore (commit: ${{ github.sha }})
Build date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
"@ | Out-File artifacts/README.txt -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-windows
          path: artifacts/
