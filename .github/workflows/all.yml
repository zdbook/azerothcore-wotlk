name: Full Build AzerothCore (All Components)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  full-build:
    name: Full Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact-suffix: linux
          - os: windows-2022
            artifact-suffix: windows
          - os: macos-13
            artifact-suffix: macos

    steps:
      - name: Checkout source code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      # ========= 安装系统依赖 =========
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake make gcc g++ clang libmysqlclient-dev libssl-dev libbz2-dev libreadline-dev libncurses-dev libboost-all-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake openssl mysql-client boost

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install openssl boost-msvc-14.3 mysql

      # ========= CMake 配置 (关键修复: 强制指定安装路径) =========
      - name: Configure CMake (Full Build)
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DTOOLS_BUILD=all \
            -DSCRIPTS=dynamic \
            -DMODULES=static \
            -DWITH_WARNINGS=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      # ========= 编译所有目标 =========
      - name: Build all (servers + tools + scripts)
        run: cmake --build build --config RelWithDebInfo --parallel 4

      # ========= 安装到统一目录 =========
      - name: Install to directory
        run: cmake --install build --config RelWithDebInfo

      # ========= 打包产物：Unix (Linux/macOS) =========
      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp -r install/bin install/etc install/scripts artifacts/ 2>/dev/null || true
          cp -v apps/extractor/extractor.bat artifacts/ 2>/dev/null || true
          echo "Full build of AzerothCore (commit: ${{ github.sha }})" > artifacts/README.txt
          echo "Build date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> artifacts/README.txt

      # ========= 打包产物：Windows (增加容错) =========
      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          # 更精确地查找安装目录
          if (Test-Path "install/bin") {
            $installDir = "install"
          } else {
            Write-Warning "install directory not found, falling back to build/bin/RelWithDebInfo"
            $installDir = "build/bin/RelWithDebInfo"
          }
          
          $binDir = "$installDir/bin"
          $required = @(
            "worldserver.exe", "authserver.exe",
            "mapextractor.exe", "mmaps_generator.exe",
            "vmap4extractor.exe", "vmap4assembler.exe", "dbimport.exe"
          )
          $missing = @()
          foreach ($file in $required) {
            if (-not (Test-Path "$binDir/$file")) {
              $missing += $file
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required binaries in '$binDir': $($missing -join ', ')"
            Write-Host "Contents of '$binDir':" -ForegroundColor Yellow
            Get-ChildItem -Path $binDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  - $($_.Name)" }
            exit 1
          }

          # 创建 artifacts 目录结构
          New-Item -ItemType Directory -Force -Path artifacts/bin, artifacts/etc, artifacts/scripts | Out-Null
          Copy-Item "$installDir/bin/*" -Destination "artifacts/bin/" -Recurse -Force
          Copy-Item "$installDir/etc/*" -Destination "artifacts/etc/" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "$installDir/scripts/*" -Destination "artifacts/scripts/" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "apps/extractor/extractor.bat" -Destination "artifacts/" -ErrorAction SilentlyContinue
          
          "Full build of AzerothCore (commit: ${{ github.sha }})" | Out-File artifacts/README.txt -Encoding utf8
          "Build date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')" | Out-File artifacts/README.txt -Append -Encoding utf8
        shell: pwsh

      # ========= 创建 ZIP 压缩包 =========
      - name: Create final zip archive
        run: |
          cd artifacts
          zip -r ../azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip .
        shell: bash

      # ========= 上传 Artifact（供下载） =========
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-full-${{ matrix.artifact-suffix }}
          path: azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 7
