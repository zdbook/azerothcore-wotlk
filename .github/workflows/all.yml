name: Full Build AzerothCore (All Components)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  full-build:
    name: Full Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact-suffix: linux
          - os: windows-2022
            artifact-suffix: windows
          - os: macos-13
            artifact-suffix: macos

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      # ---------- 依赖安装 ----------
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake make gcc g++ clang libmysqlclient-dev libssl-dev libbz2-dev libreadline-dev libncurses-dev libboost-all-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake openssl mysql-client boost

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install openssl boost-msvc-14.3 mysql

      # ---------- CMake 配置（修复 PIC 和 Windows 换行）----------
      - name: Configure CMake (Full Build)
        # 在 Windows 上使用 cmd 作为 shell，避免 PowerShell 的反斜杠问题
        shell: cmd
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=RelWithDebInfo -DTOOLS_BUILD=all -DSCRIPTS=dynamic -DMODULES=static -DWITH_WARNINGS=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      # ---------- 编译全部 ----------
      - name: Build all (servers + tools + scripts)
        run: cmake --build build --config RelWithDebInfo --parallel 4

      # ---------- 打包产物 ----------
      - name: Prepare artifacts for packaging (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts/bin artifacts/etc artifacts/scripts
          cp -v build/bin/worldserver   artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/authserver    artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/mapextractor  artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/mmaps_generator artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/vmap4extractor artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/vmap4assembler artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/dbimport      artifacts/bin/ 2>/dev/null || true
          cp -v build/lib/libscripts.so  artifacts/scripts/ 2>/dev/null || true
          cp -v src/server/worldserver/worldserver.conf.dist artifacts/etc/
          cp -v src/server/authserver/authserver.conf.dist artifacts/etc/
          cp -v apps/extractor/extractor.bat artifacts/ 2>/dev/null || true
          echo "Full build of AzerothCore (commit: ${{ github.sha }})" > artifacts/README.txt

      - name: Prepare artifacts for packaging (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts\bin, artifacts\etc, artifacts\scripts -Force
          copy build\bin\RelWithDebInfo\worldserver.exe artifacts\bin\
          copy build\bin\RelWithDebInfo\authserver.exe artifacts\bin\
          copy build\bin\RelWithDebInfo\mapextractor.exe artifacts\bin\
          copy build\bin\RelWithDebInfo\mmaps_generator.exe artifacts\bin\
          copy build\bin\RelWithDebInfo\vmap4extractor.exe artifacts\bin\
          copy build\bin\RelWithDebInfo\vmap4assembler.exe artifacts\bin\
          copy build\bin\RelWithDebInfo\dbimport.exe artifacts\bin\
          copy build\bin\RelWithDebInfo\scripts.dll artifacts\scripts\
          copy src\server\worldserver\worldserver.conf.dist artifacts\etc\
          copy src\server\authserver\authserver.conf.dist artifacts\etc\
          copy apps\extractor\extractor.bat artifacts\
          Write-Output "Full build of AzerothCore (commit: ${{ github.sha }})" | Out-File artifacts\README.txt -Encoding utf8
        shell: pwsh

      - name: Create final zip archive
        run: |
          cd artifacts
          zip -r ../azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip .
        shell: bash

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-full-${{ matrix.artifact-suffix }}
          path: azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 7
