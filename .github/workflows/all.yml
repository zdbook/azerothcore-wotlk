name: Full Build AzerothCore (All Components)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  full-build:
    name: Full Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact-suffix: linux
          - os: windows-2022
            artifact-suffix: windows
          - os: macos-13
            artifact-suffix: macos

    steps:
      - name: Checkout source code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      # ========= 安装系统依赖 =========
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake make gcc g++ clang libmysqlclient-dev libssl-dev libbz2-dev libreadline-dev libncurses-dev libboost-all-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake openssl mysql-client boost

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install openssl boost-msvc-14.3 mysql

      # ========= CMake 配置 =========
      - name: Configure CMake (Full Build)
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DTOOLS_BUILD=all \
            -DSCRIPTS=dynamic \
            -DMODULES=static \
            -DWITH_WARNINGS=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON

      # ========= 编译所有目标 =========
      - name: Build all (servers + tools + scripts)
        run: cmake --build build --config RelWithDebInfo --parallel 4

      # ========= 安装配置和脚本（用于提取配置文件）==========
      - name: Install configs and scripts
        run: cmake --install build --config RelWithDebInfo --prefix ./install

      # ========= 打包产物：Windows =========
      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          $binDir = "build/bin/RelWithDebInfo"
          $required = @(
            "worldserver.exe", "authserver.exe",
            "map_extractor.exe", "mmaps_generator.exe",
            "vmap4_extractor.exe", "vmap4_assembler.exe", "dbimport.exe"
          )
          $missing = @()
          foreach ($file in $required) {
            if (-not (Test-Path "$binDir/$file")) {
              $missing += $file
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required binaries in '${binDir}': $($missing -join ', ')"
            Write-Host "Contents of ${binDir}:"
            Get-ChildItem $binDir | Select-Object Name
            exit 1
          }
          New-Item -ItemType Directory -Force -Path artifacts/bin, artifacts/etc, artifacts/scripts | Out-Null
          Copy-Item "$binDir/*.exe" -Destination "artifacts/bin/" -Force
          # 脚本库
          if (Test-Path "install/scripts") {
            Copy-Item "install/scripts/*.dll" -Destination "artifacts/scripts/" -Force -ErrorAction SilentlyContinue
          } else {
            Copy-Item "$binDir/scripts_*.dll" -Destination "artifacts/scripts/" -Force -ErrorAction SilentlyContinue
          }
          # 动态查找配置文件（解决路径不存在问题）
          $worldConf = Get-ChildItem -Recurse -Filter "worldserver.conf.dist" -ErrorAction SilentlyContinue | Select-Object -First 1
          $authConf = Get-ChildItem -Recurse -Filter "authserver.conf.dist" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($worldConf) {
            Copy-Item $worldConf.FullName -Destination "artifacts/etc/" -Force
          } else {
            Write-Warning "worldserver.conf.dist not found"
          }
          if ($authConf) {
            Copy-Item $authConf.FullName -Destination "artifacts/etc/" -Force
          } else {
            Write-Warning "authserver.conf.dist not found"
          }
          Copy-Item "apps/extractor/extractor.bat" -Destination "artifacts/" -Force -ErrorAction SilentlyContinue
          @"
          Full build of AzerothCore (commit: ${{ github.sha }})
          Build date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
          "@ | Out-File artifacts/README.txt -Encoding utf8
        shell: pwsh

      # ========= 打包产物：Unix (Linux/macOS) =========
      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts/bin artifacts/etc artifacts/scripts
          # 可执行文件从 build/bin 复制
          cp -v build/bin/worldserver   artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/authserver    artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/map_extractor artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/mmaps_generator artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/vmap4_extractor artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/vmap4_assembler artifacts/bin/ 2>/dev/null || true
          cp -v build/bin/dbimport      artifacts/bin/ 2>/dev/null || true
          # 脚本库
          if [ -d "install/scripts" ]; then
            cp -v install/scripts/libscripts_*.so artifacts/scripts/ 2>/dev/null || true
            cp -v install/scripts/libscripts_*.dylib artifacts/scripts/ 2>/dev/null || true
          else
            cp -v build/lib/libscripts_*.so artifacts/scripts/ 2>/dev/null || true
            cp -v build/lib/libscripts_*.dylib artifacts/scripts/ 2>/dev/null || true
          fi
          # 查找配置文件（递归）
          worldConf=$(find . -name "worldserver.conf.dist" -type f | head -1)
          authConf=$(find . -name "authserver.conf.dist" -type f | head -1)
          if [ -n "$worldConf" ]; then cp -v "$worldConf" artifacts/etc/; fi
          if [ -n "$authConf" ]; then cp -v "$authConf" artifacts/etc/; fi
          cp -v apps/extractor/extractor.bat artifacts/ 2>/dev/null || true
          echo "Full build of AzerothCore (commit: ${{ github.sha }})" > artifacts/README.txt
          echo "Build date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> artifacts/README.txt

      # ========= 创建 ZIP 压缩包 =========
      - name: Create final zip archive
        run: |
          cd artifacts
          zip -r ../azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip .
        shell: bash

      # ========= 上传 Artifact =========
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-full-${{ matrix.artifact-suffix }}
          path: azerothcore-full-${{ matrix.artifact-suffix }}-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 7
